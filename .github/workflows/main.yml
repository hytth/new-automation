name: YouTube & Facebook Automation System

on:
  schedule:
    # Yeh script Har 1 ghante ke 0 minute par automatically run hoga
    - cron: '0 * * * *'
  workflow_dispatch: # Yahan click karke manually bhi chala sakti hain

jobs:
  automate:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install NordVPN (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 6A7D833C0115D9E8FF4A3B3B24C03F9A10E5D8A
          sudo sh -c 'echo "deb http://repo.nordvpn.com/deb stable main" > /etc/apt/sources.list.d/nordvpn.list'
          sudo apt-get update
          sudo apt-get install -y nordvpn

      - name: 4. Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: 5. Create .env and Credentials Folder
        env:
          # Yahan GitHub Secrets ka data aa kar local files mein convert hoga
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_EMAIL_APP_PASSWORD: ${{ secrets.SENDER_EMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          NORDVPN_USERNAME: ${{ secrets.NORDVPN_USERNAME }}
          NORDVPN_PASSWORD: ${{ secrets.NORDVPN_PASSWORD }}
          FB_API_DATA: ${{ secrets.FB_API_DATA }}
          YOUTUBE_CREDS: ${{ secrets.YOUTUBE_CREDS }}
          SHEET_LINK: ${{ secrets.SHEET_LINK }}
        run: |
          # .env file banai
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
          echo "SENDER_EMAIL=$SENDER_EMAIL" >> .env
          echo "SENDER_EMAIL_APP_PASSWORD=$SENDER_EMAIL_APP_PASSWORD" >> .env
          echo "RECEIVER_EMAIL=$RECEIVER_EMAIL" >> .env
          echo "NORDVPN_USERNAME=$NORDVPN_USERNAME" >> .env
          echo "NORDVPN_PASSWORD=$NORDVPN_PASSWORD" >> .env
          echo "NORDVPN_SERVER=United States" >> .env
          echo "NORDVPN_CITY=New York" >> .env
          echo "CREDENTIALS_FOLDER_PATH=./credentials" >> .env
          echo "SHEET_LINK_FILE_PATH=./Sheet Link" >> .env
          echo "FACEBOOK_API_FILE_PATH=./credentials/facebook page api.txt" >> .env
          echo "STATE_FILE_PATH=./state.json" >> .env
          
          # credentials folder banai
          mkdir -p credentials
          
          # Files mein secrets daalein
          echo "$SHEET_LINK" > "Sheet Link"
          echo "$FB_API_DATA" > "credentials/facebook page api.txt"
          echo "$YOUTUBE_CREDS" > "credentials/youtube_creds.json"

      - name: 6. Run Automation Script
        run: python main.py